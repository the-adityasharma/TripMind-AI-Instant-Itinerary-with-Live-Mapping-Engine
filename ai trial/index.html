<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TripMind AI | Instant Travel Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #6366f1; border-radius: 10px; }
        #map { height: 75vh; width: 100%; border-radius: 1.5rem; }
    </style>
</head>
<body class="bg-slate-50 font-sans">
    <div class="max-w-7xl mx-auto p-4 md:p-8">
        <header class="mb-8">
            <h1 class="text-4xl font-black text-indigo-600 tracking-tight">TripMind AI</h1>
            <p class="text-slate-500">AI-Powered Itineraries & Live Mapping</p>
        </header>
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <div class="lg:col-span-3">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 sticky top-8">
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Destination</label>
                    <input id="dest" type="text" placeholder="e.g. Kyoto, Japan" class="w-full mb-4 p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Days (1-7)</label>
                    <input id="days" type="number" value="3" min="1" max="7" class="w-full mb-4 p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition-all">
                    
                    <label class="block text-xs font-bold uppercase text-slate-400 mb-2">Your Interests</label>
                    <textarea id="interests" placeholder="e.g. Street food, Anime, Parks" class="w-full mb-6 p-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500 transition-all h-24"></textarea>
                    
                    <button onclick="planTrip()" id="btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg shadow-indigo-100">Generate Itinerary</button>
                </div>
            </div>

            <div class="lg:col-span-4 h-[75vh] overflow-y-auto pr-4 custom-scrollbar" id="itinerary">
                <div class="h-full flex flex-col items-center justify-center text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl">
                    <p>Enter a destination to start</p>
                </div>
            </div>

            <div class="lg:col-span-5">
                <div id="map" class="shadow-inner border border-slate-200 overflow-hidden"></div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
